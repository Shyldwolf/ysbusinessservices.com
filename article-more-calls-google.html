      <p data-en="For many local businesses, Google is one of the main places where potential customers decide who to call. If your profile and online presence are weak, incomplete, or inconsistent, you may be losing leads without realizing it."
        data-es="Para muchos negocios locales, Google es uno de los principales lugares donde los clientes potenciales deciden a quién llamar. Si tu perfil y presencia online son débiles, incompletos o inconsistentes, podrías estar perdiendo leads sin darte cuenta.">
      </p>
    </section>

    <!-- REASON 1 -->
    <section class="section card">
      <h3 data-en="1) Your Google Business Profile is incomplete"
        data-es="1) Tu Google Business Profile está incompleto"></h3>
      <p data-en="If your profile is missing services, service areas, business description, photos, or updated information, people are less likely to trust it and contact you."
        data-es="Si a tu perfil le faltan servicios, áreas de servicio, descripción del negocio, fotos o información actualizada, es menos probable que las personas confíen en él y te contacten.">
      </p>
      <p data-en="A profile that looks unfinished usually gets ignored in favor of businesses that look more complete and active."
        data-es="Un perfil que se ve incompleto normalmente es ignorado a favor de negocios que se ven más completos y activos.">
      </p>
    </section>

    <!-- REASON 2 -->
    <section class="section card">
      <h3 data-en="2) You do not have enough strong photos"
        data-es="2) No tienes suficientes fotos sólidas"></h3>
      <p data-en="Photos help people feel that your business is real, active, and professional. If your profile has very few photos—or low-quality ones—you lose trust quickly."
        data-es="Las fotos ayudan a que las personas sientan que tu negocio es real, activo y profesional. Si tu perfil tiene muy pocas fotos o fotos de baja calidad, pierdes confianza rápidamente.">
      </p>
      <p data-en="For contractors and service businesses, photos of work, team members, vehicles, equipment, and completed jobs can make a big difference."
        data-es="Para contratistas y negocios de servicios, las fotos de trabajos realizados, equipo, vehículos, herramientas y proyectos terminados pueden hacer una gran diferencia.">
      </p>
    </section>

    <!-- REASON 3 -->
    <section class="section card">
      <h3 data-en="3) Your reviews are weak or inconsistent"
        data-es="3) Tus reseñas son débiles o inconsistentes"></h3>
      <p data-en="A business with only a few reviews—or one that rarely gets new ones—can look less trustworthy than competitors with stronger review activity."
        data-es="Un negocio con pocas reseñas, o que rara vez recibe nuevas, puede verse menos confiable que otros competidores con más actividad en reseñas.">
      </p>
      <p data-en="Even if you do good work, customers often judge what they see first. A simple review request system can improve trust over time."
        data-es="Aunque hagas un buen trabajo, los clientes normalmente juzgan primero lo que ven. Un sistema simple para pedir reseñas puede mejorar la confianza con el tiempo.">
      </p>
    </section>

    <!-- REASON 4 -->
    <section class="section card">
      <h3 data-en="4) Your website or quote process is weak"
        data-es="4) Tu website o proceso de cotización es débil"></h3>
      <p data-en="Sometimes your Google profile gets attention, but your website or quote process does not help convert that attention into leads."
        data-es="A veces tu perfil de Google sí llama la atención, pero tu website o proceso de cotización no ayuda a convertir esa atención en leads.">
      </p>
      <p data-en="If people cannot quickly understand your services, trust your business, or request a quote easily, many of them leave without taking action."
        data-es="Si las personas no pueden entender rápidamente tus servicios, confiar en tu negocio o solicitar una cotización fácilmente, muchas se van sin tomar acción.">
      </p>
    </section>

    <!-- REASON 5 -->
    <section class="section card">
      <h3 data-en="5) You do not follow up consistently"
        data-es="5) No das seguimiento de forma constante"></h3>
      <p data-en="Even when people call or ask for pricing, many businesses lose leads because they do not follow up quickly or consistently enough."
        data-es="Incluso cuando las personas llaman o piden precios, muchos negocios pierden leads porque no dan seguimiento con suficiente rapidez o constancia.">
      </p>
      <p data-en="A simple follow-up process can make the difference between a lost lead and a closed job."
        data-es="Un proceso simple de seguimiento puede marcar la diferencia entre un lead perdido y un trabajo cerrado.">
