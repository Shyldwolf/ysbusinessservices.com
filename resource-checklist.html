          data-es="El nombre de tu negocio, teléfono y correo son fáciles de encontrar."></li>

        <li data-en="You have a clear Google Business Profile with the correct business information."

        <li data-en="Your business has reviews and a simple way to request more."
          data-es="Tu negocio tiene reseñas y una forma simple de pedir más."></li>

        <li data-en="You have a website or landing page that explains your services clearly."
          data-es="Tienes una website o landing page que explica tus servicios claramente."></li>

        <li data-en="Your contact form or quote process is simple and easy to use."
          data-es="Tu formulario de contacto o proceso de cotización es simple y fácil de usar."></li>

        <li data-en="You respond to new leads quickly and consistently."
          data-es="Respondes a nuevos leads de forma rápida y constante."></li>

        <li data-en="You have a basic system to track leads, follow-ups, and quotes."

        <li data-en="Your business looks consistent across Google, website, and customer communication."
          data-es="Tu negocio se ve consistente en Google, website y comunicación con clientes."></li>
      </ul>
